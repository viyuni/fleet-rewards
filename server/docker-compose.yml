name: guard-plus

services:
  guard-plus-db:
    image: postgres:18-alpine
    container_name: gp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: guard_plus
      POSTGRES_DB: guard-plus
    ports:
      - '5433:5432'

  guard-plus-db-test:
    image: postgres:18-alpine
    container_name: gp-db-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: guard_plus
      POSTGRES_DB: guard-plus-test
    ports:
      - '5434:5432'

  guard-plus-redis:
    image: redis:7.2-alpine
    container_name: gp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - guard-plus-redis-data:/data

volumes:
  guard-plus-redis-data:
