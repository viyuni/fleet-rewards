services:
  guard-plus:
    image: postgres:18-alpine
    container_name: guard-plus
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: guard_plus
      POSTGRES_DB: guard-plus
    ports:
      - '5433:5432'

  guard-plus-test:
    image: postgres:18-alpine
    container_name: guard-plus-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: guard_plus
      POSTGRES_DB: guard-plus-test
    ports:
      - '5434:5432'
